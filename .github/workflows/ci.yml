name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xdotool xclip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install platform extras (Linux)
        if: runner.os == 'Linux'
        run: pip install keyboard psutil

      - name: Install platform extras (macOS)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-AppKit psutil

      - name: Install platform extras (Windows)
        if: runner.os == 'Windows'
        run: pip install pywinauto pygetwindow keyboard psutil

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest --tb=short -q

  ui-typecheck:
    name: UI — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build (Vite only, no Tauri)
        working-directory: ui
        run: npm run build
        env:
          # Skip Tauri-specific APIs during CI build
          VITE_SKIP_TAURI: "1"

  rust-check:
    name: Rust — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
      - name: Create dummy sidecar for Tauri validation
        run: |
          touch ui/src-tauri/quill-core-x86_64-unknown-linux-gnu
          chmod +x ui/src-tauri/quill-core-x86_64-unknown-linux-gnu
      - name: Cargo check
        working-directory: ui/src-tauri
        run: cargo check --all-targets
