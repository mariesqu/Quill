name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_sep: ";"
            sidecar_name: quill-core-x86_64-pc-windows-msvc.exe
            python_extras: "windows"
          - os: macos-latest
            target: aarch64-apple-darwin
            sidecar_sep: ":"
            sidecar_name: quill-core-aarch64-apple-darwin
            python_extras: "macos"
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar_sep: ":"
            sidecar_name: quill-core-x86_64-apple-darwin
            python_extras: "macos"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sidecar_sep: ":"
            sidecar_name: quill-core-x86_64-unknown-linux-gnu
            python_extras: "linux"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf xdotool xclip

      - name: Install Python dependencies
        run: |
          pip install -e ".[${{ matrix.python_extras }}]"
          pip install "pyinstaller>=6.0,<7.0"

      - name: Install macOS extras (best effort)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-AppKit || true

      - name: Build Python sidecar
        run: |
          python -m PyInstaller \
            --onefile \
            --name quill-core \
            --distpath ui \
            --add-data "config/default.yaml${{ matrix.sidecar_sep }}config" \
            --add-data "config/modes.yaml${{ matrix.sidecar_sep }}config" \
            --hidden-import core \
            --hidden-import core.main \
            --hidden-import core.config_loader \
            --hidden-import core.streamer \
            --hidden-import core.history \
            --hidden-import core.tutor \
            --hidden-import core.clipboard_monitor \
            --hidden-import core.platform \
            --hidden-import core.prompt_builder \
            --hidden-import providers \
            --hidden-import providers.openrouter \
            --hidden-import providers.ollama \
            --hidden-import providers.openai \
            --hidden-import providers.generic \
            --hidden-import providers.generic_endpoint \
            --hidden-import platform_ \
            --hidden-import pynput.keyboard._xorg \
            --hidden-import pynput.keyboard._darwin \
            --hidden-import pynput.keyboard._win32 \
            quill_entry.py

      - name: Rename sidecar for Tauri target triple
        shell: bash
        run: |
          if [ -f "ui/quill-core.exe" ]; then
            cp "ui/quill-core.exe" "ui/${{ matrix.sidecar_name }}"
          elif [ -f "ui/quill-core" ]; then
            cp "ui/quill-core" "ui/${{ matrix.sidecar_name }}"
            chmod +x "ui/${{ matrix.sidecar_name }}"
          fi
          ls -la ui/quill-core*

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/mariesqu/Quill/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
