# Quill default configuration
# Copy to config/user.yaml to override (user.yaml is gitignored)

provider: openrouter
model: google/gemma-3-27b-it        # Free tier on OpenRouter
api_key: null                        # Set via env QUILL_API_KEY or settings UI
base_url: https://openrouter.ai/api/v1

# Custom headers for API authentication (generic provider only)
# One header per line: "Header-Name: value"
# Useful for self-hosted models behind API gateways (Kong, Nginx, Azure APIM)
# Example: "X-Client-Id: my-app\nX-Client-Secret: my-secret"
custom_headers: ""

# null = OS-adaptive: Ctrl+Shift+Space on Windows/Linux, Cmd+Shift+Space on macOS
hotkey: null

language: auto                       # Default output language (overridden per-invocation by the overlay picker)
overlay_position: near_cursor        # near_cursor | top_right | top_left
stream: true

# ── Persona / Voice ───────────────────────────────────────────────────────────
persona:
  enabled: false
  tone: natural                      # natural | casual | professional | witty | direct | warm
  style: ""
  avoid: ""

# ── History & AI Tutor ────────────────────────────────────────────────────────
history:
  enabled: false                     # opt-in: stores transformations locally in ~/.quill/history.db
  max_entries: 10000                 # entries beyond this are pruned (oldest first)

tutor:
  enabled: false                     # AI Tutor features (requires history.enabled: true)
  auto_explain: false                # Automatically show explanation after each transformation
  lesson_language: auto              # Focus lessons on this language (auto = most-used)

# ── Clipboard Monitor ────────────────────────────────────────────────────────
clipboard_monitor:
  enabled: false                     # opt-in: watch clipboard and offer to transform new text

# ── Quick Templates ───────────────────────────────────────────────────────────
# Named mode + instruction presets shown as chips in the overlay.
# templates:
#   - name: "Slack update"
#     mode: shorter
#     instruction: "use bullet points, keep it under 3 lines"
#   - name: "Professional email"
#     mode: formal
#     instruction: "suitable for client communication"
templates: []

# Context-aware mode overrides (optional)
# context:
#   outlook:
#     default_mode: formal
#   code:
#     default_mode: technical
