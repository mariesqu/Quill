# Quill default configuration
# Copy to config/user.yaml to override (user.yaml is gitignored)

provider: openrouter
model: google/gemma-3-27b-it        # Free tier on OpenRouter
api_key: null                        # Set via env QUILL_API_KEY or settings UI
base_url: https://openrouter.ai/api/v1

# Hotkey spec uses Windows modifier names (Ctrl / Shift / Alt / Win) —
# Quill is Windows-only; macOS Cmd and Linux Super are not recognised.
# null = Ctrl+Shift+Space (compiled default)
hotkey: null
# Command palette (Tier 2). Ctrl+Shift+P matches VS Code / Slack / Sublime
# muscle memory. Windows modifier names only (Ctrl/Shift/Alt/Win). Set to
# null to skip registration.
hotkey_palette: "Ctrl+Shift+P"

language: auto                       # Default output language (overridden per-invocation by the overlay picker)
stream: true

# ── Persona / Voice ───────────────────────────────────────────────────────────
persona:
  enabled: false
  tone: natural                      # natural | casual | professional | witty | direct | warm
  style: ""
  avoid: ""

# ── History & AI Tutor ────────────────────────────────────────────────────────
history:
  enabled: true                      # stores transformations locally in ~/.quill/history.db (set to false for strict no-history)
  max_entries: 10000                 # entries beyond this are pruned (oldest first)

tutor:
  enabled: false                     # AI Tutor features (requires history.enabled: true)
  auto_explain: false                # Automatically show explanation after each transformation
  lesson_language: auto              # Focus lessons on this language (auto = most-used)

# ── Clipboard Monitor ────────────────────────────────────────────────────────
clipboard_monitor:
  enabled: false                     # opt-in: watch clipboard and offer to transform new text

# ── Quick Templates ───────────────────────────────────────────────────────────
# Reserved for a future "quick presets" UI. Declaring templates has no
# runtime effect today.
# templates:
#   - name: "Slack update"
#     mode: shorter
#     instruction: "use bullet points, keep it under 3 lines"
#   - name: "Professional email"
#     mode: formal
#     instruction: "suitable for client communication"
templates: []

# ── UI: per-surface customisation ─────────────────────────────────────────────
ui:
  overlay:
    # The two pinned translation targets shown as quick-action buttons on
    # the Tier 1 overlay. Labels derive from the codes (uppercased).
    # Change these to the pair you translate between most.
    pinned_translate:
      a: "en"
      b: "fr"

# Context-aware mode overrides (optional)
# context:
#   outlook:
#     default_mode: formal
#   code:
#     default_mode: technical
