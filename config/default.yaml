# Quill default configuration
# Copy to config/user.yaml to override (user.yaml is gitignored)

provider: openrouter
model: google/gemma-3-27b-it        # Free tier on OpenRouter
api_key: null                        # Set via env QUILL_API_KEY or settings UI
base_url: https://openrouter.ai/api/v1

# null = OS-adaptive: Ctrl+Shift+Space on Windows/Linux, Cmd+Shift+Space on macOS
hotkey: null

language: auto                       # Default output language (overridden per-invocation by the overlay picker)
overlay_position: near_cursor        # near_cursor | top_right | top_left
stream: true

# ── Persona / Voice ───────────────────────────────────────────────────────────
# When enabled, these constraints are injected into every AI request so that
# output sounds more like you, regardless of which mode is used.
persona:
  enabled: false
  tone: natural                      # natural | casual | professional | witty | direct | warm
  style: ""                          # Free text: "Short punchy sentences. I use em-dashes."
  avoid: ""                          # Things to avoid: "passive voice, corporate buzzwords"

# Context-aware mode overrides (optional)
# context:
#   outlook:
#     default_mode: formal
#   code:
#     default_mode: technical
