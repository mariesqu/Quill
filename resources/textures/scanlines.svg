<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4" viewBox="0 0 4 4">
  <!-- CRT scan lines — 1% white on every other pair of rows, tiled over
       the whole window. Direct port of portfolio.html `.hero-bg::after`
       repeating-linear-gradient. -->
  <rect x="0" y="0" width="4" height="2" fill="rgba(255,255,255,0)"/>
  <rect x="0" y="2" width="4" height="2" fill="rgba(255,255,255,0.012)"/>
</svg>
